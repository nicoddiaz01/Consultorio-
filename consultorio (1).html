<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consultorio Kinésico</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* ============ TOKENS ============ */
:root{
  --ink:#13242b;
  --ink-soft:#3d5560;
  --paper:#f4f7f6;
  --paper-raised:#ffffff;
  --line:#d8e2e0;
  --petrol:#1b4965;
  --petrol-dark:#0f2e42;
  --petrol-tint:#e7eef2;
  --sage:#4f9a6f;
  --sage-tint:#e5f3ea;
  --amber:#d9952f;
  --amber-tint:#fbf0dd;
  --terra:#bd4338;
  --terra-tint:#fae4e1;
  --gold:#c9a13b;
  --shadow:0 1px 2px rgba(19,36,43,.06), 0 4px 14px rgba(19,36,43,.06);
  --shadow-lg:0 8px 30px rgba(19,36,43,.14);
  --radius:10px;
  --radius-sm:6px;
  --font-display:'Space Grotesk', sans-serif;
  --font-body:'Inter', sans-serif;
  --font-mono:'JetBrains Mono', monospace;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:var(--font-body);
  font-size:15px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{font-family:var(--font-display);margin:0;color:var(--petrol-dark);}
.mono{font-family:var(--font-mono);}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;font-size:14px;}
a{color:var(--petrol);}
::selection{background:var(--petrol-tint);}

:focus-visible{outline:2px solid var(--petrol);outline-offset:2px;}

/* ============ LAYOUT SHELL ============ */
#app{display:flex;min-height:100vh;}

.sidebar{
  width:236px;
  flex-shrink:0;
  background:linear-gradient(180deg, var(--petrol-dark), #0a212f);
  color:#dce9ee;
  display:flex;
  flex-direction:column;
  position:sticky;
  top:0;
  height:100vh;
}
.brand{
  padding:22px 20px 16px;
  border-bottom:1px solid rgba(255,255,255,.08);
}
.brand-mark{
  font-family:var(--font-display);
  font-weight:700;
  font-size:19px;
  color:#fff;
  letter-spacing:-.01em;
  display:flex;
  align-items:center;
  gap:9px;
}
.brand-mark svg{flex-shrink:0;}
.brand-sub{
  font-size:11.5px;
  color:#7fa2b3;
  margin-top:3px;
  letter-spacing:.04em;
  text-transform:uppercase;
}
.group-switch{
  display:flex;flex-direction:column;gap:4px;margin:12px 10px 4px;
}
.group-btn{
  text-align:left;padding:9px 11px;border-radius:var(--radius-sm);border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.04);color:#a9c3cf;font-size:12.5px;font-weight:600;
}
.group-btn.active{background:rgba(127,207,224,.16);border-color:rgba(127,207,224,.4);color:#cdeef5;}
.group-btn:hover{background:rgba(255,255,255,.09);}
.nav{flex:1;padding:14px 10px;overflow-y:auto;}
.nav-item{
  display:flex;
  align-items:center;
  gap:11px;
  padding:10px 12px;
  border-radius:var(--radius-sm);
  color:#a9c3cf;
  font-size:13.5px;
  font-weight:500;
  cursor:pointer;
  margin-bottom:2px;
  transition:background .12s, color .12s;
  border:none;
  background:none;
  width:100%;
  text-align:left;
}
.nav-item svg{flex-shrink:0;opacity:.85;}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff;}
.nav-item.active{background:rgba(255,255,255,.1);color:#fff;}
.nav-item.active svg{opacity:1;}
.nav-section-label{
  font-size:10.5px;
  text-transform:uppercase;
  letter-spacing:.08em;
  color:#5d8294;
  padding:14px 12px 6px;
  font-weight:600;
}
.patient-pill{
  margin:10px 10px 4px;
  padding:10px 12px;
  background:rgba(255,255,255,.07);
  border-radius:var(--radius-sm);
  border:1px solid rgba(255,255,255,.09);
}
.patient-pill-label{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:#7fa2b3;margin-bottom:2px;}
.patient-pill-name{font-size:13.5px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sidebar-foot{
  padding:14px 16px;
  border-top:1px solid rgba(255,255,255,.08);
  font-size:11px;
  color:#5d8294;
  display:flex;
  gap:8px;
}
.sidebar-foot button{
  background:none;border:none;color:#7fa2b3;font-size:11px;padding:4px 0;
  text-decoration:underline;text-decoration-color:rgba(127,162,179,.4);
}
.sidebar-foot button:hover{color:#fff;}

.main{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{
  background:var(--paper-raised);
  border-bottom:1px solid var(--line);
  padding:16px 28px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  position:sticky;top:0;z-index:20;
}
.topbar h1{font-size:19px;}
.topbar-eyebrow{font-size:11.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-soft);font-weight:600;margin-bottom:2px;}
.view{padding:26px 28px 60px;max-width:1180px;}
.view[hidden]{display:none;}

/* ============ COMPONENTS ============ */
.btn{
  display:inline-flex;align-items:center;gap:7px;
  padding:9px 16px;
  border-radius:var(--radius-sm);
  border:1px solid var(--line);
  background:var(--paper-raised);
  color:var(--ink);
  font-size:13.5px;
  font-weight:600;
  transition:border-color .12s, background .12s, transform .06s;
  white-space:nowrap;
}
.btn:hover{border-color:var(--petrol);}
.btn:active{transform:translateY(1px);}
.btn-primary{background:var(--petrol);color:#fff;border-color:var(--petrol);}
.btn-primary:hover{background:var(--petrol-dark);border-color:var(--petrol-dark);}
.btn-danger{color:var(--terra);border-color:var(--terra-tint);}
.btn-danger:hover{background:var(--terra-tint);border-color:var(--terra);}
.btn-ghost{border-color:transparent;background:none;}
.btn-ghost:hover{background:var(--petrol-tint);}
.btn-sm{padding:6px 11px;font-size:12.5px;}
.btn[disabled]{opacity:.45;cursor:not-allowed;}

.card{
  background:var(--paper-raised);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
}
.card-pad{padding:20px 22px;}
.card-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px;border-bottom:1px solid var(--line);gap:10px;flex-wrap:wrap;
}
.card-head h3{font-size:15.5px;}
.section-gap{margin-bottom:22px;}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
@media (max-width:760px){.grid-2,.grid-3{grid-template-columns:1fr;}}

.field{margin-bottom:13px;}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-soft);margin-bottom:5px;}
.field input,.field select,.field textarea{
  width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:var(--radius-sm);
  background:var(--paper);color:var(--ink);transition:border-color .12s;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--petrol);background:#fff;}
.field textarea{resize:vertical;min-height:64px;}
.field-hint{font-size:11.5px;color:var(--ink-soft);margin-top:4px;}

.badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 9px;border-radius:99px;font-size:11.5px;font-weight:600;
}
.badge-sage{background:var(--sage-tint);color:#2f6b46;}
.badge-amber{background:var(--amber-tint);color:#8f6315;}
.badge-terra{background:var(--terra-tint);color:#8c2f26;}
.badge-petrol{background:var(--petrol-tint);color:var(--petrol-dark);}
.badge-neutral{background:#eef1f0;color:var(--ink-soft);}

.tag{
  display:inline-flex;padding:3px 9px;border-radius:6px;font-size:11.5px;font-weight:500;
  background:var(--petrol-tint);color:var(--petrol-dark);border:1px solid transparent;
}

.empty-state{
  text-align:center;padding:50px 20px;color:var(--ink-soft);
}
.empty-state svg{margin-bottom:12px;opacity:.5;}
.empty-state h3{color:var(--ink-soft);font-size:15px;margin-bottom:6px;}
.empty-state p{font-size:13px;max-width:340px;margin:0 auto;}

.patient-list{display:grid;gap:10px;}
.patient-card{
  background:var(--paper-raised);border:1px solid var(--line);border-radius:var(--radius);
  padding:15px 18px;display:flex;align-items:center;justify-content:space-between;gap:14px;
  cursor:pointer;transition:border-color .12s, box-shadow .12s;
}
.patient-card:hover{border-color:var(--petrol);box-shadow:var(--shadow);}
.patient-card-main{display:flex;align-items:center;gap:14px;min-width:0;}
.patient-avatar{
  width:42px;height:42px;border-radius:50%;background:var(--petrol-tint);color:var(--petrol-dark);
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0;
  font-family:var(--font-display);
}
.patient-card-name{font-weight:600;font-size:14.5px;color:var(--ink);}
.patient-card-meta{font-size:12.5px;color:var(--ink-soft);margin-top:2px;}

.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:18px;flex-wrap:wrap;}
.tab-btn{
  padding:9px 14px;font-size:13px;font-weight:600;color:var(--ink-soft);
  border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px;
}
.tab-btn:hover{color:var(--petrol);}
.tab-btn.active{color:var(--petrol);border-bottom-color:var(--petrol);}

.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.filter-chip{
  padding:6px 13px;border-radius:99px;font-size:12.5px;font-weight:600;
  border:1px solid var(--line);background:var(--paper-raised);color:var(--ink-soft);
}
.filter-chip.active{background:var(--petrol);color:#fff;border-color:var(--petrol);}

table{width:100%;border-collapse:collapse;}
th{
  text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;
  color:var(--ink-soft);font-weight:600;padding:8px 10px;border-bottom:1px solid var(--line);
}
td{padding:10px;border-bottom:1px solid var(--line);font-size:13.5px;}
tr:last-child td{border-bottom:none;}

.exercise-card{
  border:1px solid var(--line);border-radius:var(--radius-sm);padding:13px 15px;
  display:flex;align-items:flex-start;justify-content:space-between;gap:10px;background:var(--paper-raised);
  margin-bottom:8px;
}
.exercise-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;}
.exercise-name{font-weight:600;font-size:14px;}
.exercise-desc{font-size:12.5px;color:var(--ink-soft);margin-top:3px;}

/* SEMÁFORO ROM */
.rom-row{
  display:grid;grid-template-columns:1.4fr .8fr .8fr 70px;gap:10px;align-items:center;
  padding:9px 4px;border-bottom:1px solid var(--line);
}
.rom-row.head{font-size:11px;text-transform:uppercase;color:var(--ink-soft);font-weight:600;letter-spacing:.03em;}
.rom-move-name{font-size:13.5px;font-weight:500;}
.rom-move-normal{font-size:11.5px;color:var(--ink-soft);}
.semaforo{
  width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:var(--font-mono);font-size:11px;font-weight:600;color:#fff;flex-shrink:0;
}
.semaforo.verde{background:var(--sage);}
.semaforo.amarillo{background:var(--amber);}
.semaforo.rojo{background:var(--terra);}
.semaforo.gris{background:#c4cdcb;color:#76837f;}

.modal-overlay{
  position:fixed;inset:0;background:rgba(15,30,38,.5);display:flex;align-items:center;justify-content:center;
  z-index:100;padding:20px;
}
.modal-overlay[hidden]{display:none;}
.modal{
  background:#fff;border-radius:var(--radius);max-width:560px;width:100%;max-height:88vh;overflow-y:auto;
  box-shadow:var(--shadow-lg);
}
.modal-head{
  padding:18px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;
  position:sticky;top:0;background:#fff;
}
.modal-body{padding:20px 22px;}
.modal-foot{padding:16px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px;}
.modal-close{background:none;border:none;font-size:20px;color:var(--ink-soft);line-height:1;padding:4px;}
.modal-close:hover{color:var(--ink);}

.toast{
  position:fixed;bottom:22px;right:22px;background:var(--petrol-dark);color:#fff;
  padding:12px 18px;border-radius:var(--radius-sm);font-size:13.5px;font-weight:500;
  box-shadow:var(--shadow-lg);z-index:200;display:flex;align-items:center;gap:9px;
  animation:toast-in .25s ease-out;
}
@keyframes toast-in{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.toast.danger{background:var(--terra);}

.checklist{display:flex;flex-direction:column;gap:7px;max-height:300px;overflow-y:auto;border:1px solid var(--line);border-radius:var(--radius-sm);padding:10px;}
.checklist label{display:flex;align-items:center;gap:9px;font-size:13px;padding:5px 6px;border-radius:5px;}
.checklist label:hover{background:var(--paper);}

.stat-tile{
  background:var(--paper-raised);border:1px solid var(--line);border-radius:var(--radius);
  padding:16px 18px;
}
.stat-tile .num{font-family:var(--font-display);font-size:26px;font-weight:700;color:var(--petrol-dark);}
.stat-tile .lbl{font-size:12px;color:var(--ink-soft);margin-top:2px;}

.kv{display:grid;grid-template-columns:130px 1fr;gap:6px 14px;font-size:13.5px;}
.kv dt{color:var(--ink-soft);font-weight:600;}
.kv dd{margin:0;}

.divider{height:1px;background:var(--line);margin:18px 0;}

.routine-block{border:1px solid var(--line);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px;background:var(--paper);}
.routine-block-head{display:flex;justify-content:space-between;align-items:center;}
.routine-meta{display:flex;gap:14px;font-size:12px;color:var(--ink-soft);margin-top:5px;}

.chart-wrap{position:relative;height:260px;}

@media (max-width:880px){
  .sidebar{position:fixed;left:-236px;z-index:50;transition:left .2s;box-shadow:var(--shadow-lg);}
  .sidebar.open{left:0;}
  .menu-toggle{display:flex !important;}
}
.menu-toggle{display:none;border:none;background:none;padding:6px;}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:.001ms !important;transition-duration:.001ms !important;}
}

/* ============ PLANILLA TIPO EXCEL (RUTINA) ============ */
.sheet-toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center;}
.sheet-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius-sm);background:#fff;}
.sheet{border-collapse:collapse;width:100%;min-width:760px;}
.sheet th{
  background:var(--petrol-tint);color:var(--petrol-dark);font-size:11px;text-transform:uppercase;
  letter-spacing:.03em;font-weight:700;padding:8px 10px;border:1px solid var(--line);white-space:nowrap;position:sticky;top:0;
}
.sheet td{border:1px solid var(--line);padding:0;font-size:13px;}
.sheet tbody tr:hover{background:#fafcfb;}
.sheet td.tag-cell{padding:6px 8px;max-width:220px;}
.sheet-input{
  width:100%;border:none;background:transparent;padding:7px 9px;font-size:13px;font-family:inherit;
}
.sheet-input:focus{background:var(--petrol-tint);outline:none;}
.sheet-input.num{text-align:center;font-family:var(--font-mono);}
.sheet td.name-cell{font-weight:600;min-width:180px;}
.sheet td.actions-cell{text-align:center;width:40px;}
.sheet-row-del{border:none;background:none;color:var(--terra);font-size:15px;padding:4px 8px;cursor:pointer;}
.sheet-row-del:hover{background:var(--terra-tint);border-radius:4px;}
.sheet-empty-row td{padding:18px;text-align:center;color:var(--ink-soft);font-size:13px;}

/* Filtro multi-select tipo chips para elegir ejercicios */
.multi-filter-group{margin-bottom:10px;}
.multi-filter-label{font-size:11.5px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.03em;margin-bottom:6px;display:block;}
.multi-filter-chips{display:flex;flex-wrap:wrap;gap:6px;}
.multi-chip{
  padding:5px 12px;border-radius:99px;font-size:12px;font-weight:600;cursor:pointer;
  border:1px solid var(--line);background:#fff;color:var(--ink-soft);
}
.multi-chip.selected{background:var(--petrol);color:#fff;border-color:var(--petrol);}

/* ============ FUERZA: kg / N / torque ============ */
.unit-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.unit-box{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius-sm);padding:8px 10px;text-align:center;}
.unit-box .v{font-family:var(--font-mono);font-weight:700;font-size:15px;color:var(--petrol-dark);}
.unit-box .u{font-size:10.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.03em;margin-top:1px;}

/* ============ BATERÍAS FUNCIONALES ============ */
.battery-card{border:1px solid var(--line);border-radius:var(--radius);background:#fff;box-shadow:var(--shadow);margin-bottom:16px;}
.battery-head{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;}
.battery-name{font-weight:700;font-size:15px;color:var(--petrol-dark);}
.battery-desc{font-size:12px;color:var(--ink-soft);margin-top:2px;}
.battery-body{padding:14px 18px;display:flex;flex-direction:column;gap:10px;}
.battery-item{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--line);}
.battery-item:last-child{border-bottom:none;}
.battery-item-name{font-size:13.5px;font-weight:500;}
.battery-item-hint{font-size:11.5px;color:var(--ink-soft);margin-top:2px;}
.battery-item-input{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.battery-item-input input{width:72px;padding:7px 9px;border:1px solid var(--line);border-radius:var(--radius-sm);text-align:right;font-family:var(--font-mono);}
.battery-item-input .unit{font-size:12px;color:var(--ink-soft);min-width:32px;}
.battery-score{font-family:var(--font-mono);font-weight:700;font-size:13px;}

/* ============ ANAMNESIS ============ */
.suggested-tests{background:var(--amber-tint);border:1px solid #f0d9a8;border-radius:var(--radius-sm);padding:12px 14px;margin-top:6px;}
.suggested-tests-title{font-size:12px;font-weight:700;color:#8f6315;text-transform:uppercase;letter-spacing:.03em;margin-bottom:6px;}
.suggested-test-item{font-size:13px;padding:3px 0;color:#5c4408;}

/* ============ BENCHMARKS POR FASE/MES ============ */
.phase-card{border:1px solid var(--line);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px;background:var(--paper);}
.phase-head{display:flex;justify-content:space-between;align-items:center;}
.phase-title{font-weight:700;font-size:13.5px;color:var(--petrol-dark);}
.phase-criteria{font-size:12.5px;color:var(--ink-soft);margin-top:4px;line-height:1.6;}

</style>
</head>
<body>

<div id="app">

  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-mark">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 2 L19 6 V14 C19 18 16 21 12 22 C8 21 5 18 5 14 V6 Z" stroke="#7fcfe0" stroke-width="1.6" fill="none"/><path d="M9 12.5 L11 14.5 L15.5 9.5" stroke="#7fcfe0" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Consultorio
      </div>
      <div class="brand-sub">Kinesiología</div>
    </div>

    <div class="group-switch" id="groupSwitch">
      <button class="group-btn active" data-group="club">Club 17 de Agosto</button>
      <button class="group-btn" data-group="consultorio">Consultorio</button>
    </div>

    <div class="patient-pill" id="activePatientPill" hidden>
      <div class="patient-pill-label">Paciente activo</div>
      <div class="patient-pill-name" id="activePatientName">—</div>
    </div>

    <div class="nav" id="navList">
      <button class="nav-item" data-view="pacientes">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="3.6"/><path d="M5 20c0-3.5 3-6 7-6s7 2.5 7 6"/></svg>
        Pacientes
      </button>
